kind: Changed
body: "**Breaking:** read-cypher and write-cypher JSON responses now wrap Neo4j driver types in camelCase JSON shapes instead of leaking Go struct field names through reflection-based serialisation. Previously the `record.AsMap()` output was marshalled directly, producing `{\"Id\":..., \"ElementId\":..., \"Labels\":..., \"Props\":...}` for nodes (PascalCase Go field names) and `{}` for `dbtype.Date` values (empty object because the struct's fields are unexported). The new wrappers emit `{\"elementId\":..., \"labels\":..., \"properties\":...}` for nodes and relationships (deprecated numeric `id` / `startId` / `endId` are dropped; `elementId` and `startElementId` / `endElementId` are the only identifiers surfaced), `{\"nodes\":..., \"relationships\":...}` for paths, `{\"x\":..., \"y\":..., \"srid\":...}` for `Point2D` / `Point3D` (matching Cypher's `point()` output), and ISO 8601 strings for `Date` / `LocalTime` / `LocalDateTime` / `Time` / `Duration`. Clients that parsed the old PascalCase shape must update their field access — notably any code reading `.Id` / `.ElementId` / `.Labels` / `.Props` on nodes, or expecting dates as an empty object. The new shape aligns with the Python Neo4j MCP server output, Cypher conventions, and Bolt-protocol naming."
