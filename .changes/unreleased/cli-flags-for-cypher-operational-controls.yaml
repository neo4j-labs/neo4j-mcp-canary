kind: Added
body: "CLI flags for all operational controls, matching the existing environment-variable surface. Previously the byte cap (`NEO4J_CYPHER_MAX_BYTES`), row cap (`NEO4J_CYPHER_MAX_ROWS`), timeout (`NEO4J_CYPHER_TIMEOUT`), and estimate guard (`NEO4J_CYPHER_MAX_ESTIMATED_ROWS`) were only configurable via environment variables and were absent from `--help` output, making them undiscoverable for operators tuning a canary deployment. The new flags are `--neo4j-cypher-max-rows`, `--neo4j-cypher-max-bytes`, `--neo4j-cypher-timeout`, and `--neo4j-cypher-max-estimated-rows`, each with env-var precedence semantics matching the existing flag pattern. The `--neo4j-schema-sample-size` flag, which previously parsed the value but silently discarded it (it was never threaded through `CLIOverrides` to `LoadConfig`), is now functional. All five flags are documented in the `--help` output in both the Options and Optional Environment Variables sections."
