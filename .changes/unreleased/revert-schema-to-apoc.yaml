kind: Changed
body: get-schema now uses APOC's `apoc.meta.schema` procedure to retrieve schema information, matching the upstream neo4j/mcp server. This replaces the `db.schema.nodeTypeProperties` / `db.schema.relTypeProperties` primary path, the per-label / per-type sampling fallback, the `SHOW CONSTRAINTS` required-property surfacing, and the completeness heuristic that cross-checked the indexes array against the nodes/relationships arrays. APOC is now a hard requirement for the tool. The response shape changes to the flat `[{key, value: {type, properties, relationships}}]` list APOC returns. The `NEO4J_SCHEMA_TIMEOUT` environment variable and `--neo4j-schema-timeout` CLI flag are removed along with the fallback — APOC's own `sample` parameter (still configurable via `NEO4J_SCHEMA_SAMPLE_SIZE` / `--neo4j-schema-sample-size`) handles bounded sampling on large graphs.
