kind: Fixed
body: read-cypher and write-cypher now surface query timeouts with a classified, actionable error instead of the raw driver passthrough. The previous behaviour returned "ConnectivityError: context deadline exceeded" when a query outran `NEO4J_CYPHER_TIMEOUT`, which sent operators hunting network/DNS issues before realising the query itself was the cause. The new error names the configured timeout value and includes remediation guidance tailored to each tool — bounding variable-length patterns, adding WHERE filters, or using LIMIT for read-cypher; reducing batch size, narrowing the MATCH, or using apoc.periodic.iterate for write-cypher. Caller cancellation (as distinct from timeout) now surfaces as a concise "cancelled" message without a remediation hint. Wrapped context errors (for example the driver's ConnectivityError enclosing context.DeadlineExceeded) are unwrapped via errors.Is so classification still fires through the driver's wrapping layer.
