kind: Fixed
body: read-cypher and write-cypher no longer leak the internal `EXPLAIN ` prefix through driver error messages. Query classification prepends `EXPLAIN ` to the user's query to detect read/write intent, and when the driver returned a syntax error it echoed the prefixed query text, cited column and offset positions against the wrapped version, and drew a caret aligned to those positions — referencing a keyword the user never typed. A new `sanitizeExplainPrefix` pass now strips `"EXPLAIN ` from the quoted echo, shifts `column N` and `offset: N` references by 8 (the prefix length), and dedents the caret line by the same amount, producing an error that reads as if the user's original query had been sent directly. The sanitiser preserves the error chain via a custom wrapper type, so `errors.Is` and `errors.As` continue to unwrap to the underlying driver error for upstream classification. Errors that don't reference the wrapped query pass through unchanged.
